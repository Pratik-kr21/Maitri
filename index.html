<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Maitri — The first period tracker that teaches you what your cycle is actually telling you. Privately, safely, and with people who get it." />
    <meta name="theme-color" content="#E87A86" />
    <title>Maitri — Know Your Cycle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #FFF5F8;
          font-family: 'Playfair Display', serif;
          color: #2C1A1D;
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        .initial-loader .spinner-ring {
          position: relative;
          width: 96px;
          height: 96px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 2rem;
        }
        .initial-loader .outer-ring {
          position: absolute;
          width: 100%;
          height: 100%;
          border: 3px dashed #FDE0E4;
          border-radius: 50%;
          animation: spin 3s linear infinite;
        }
        .initial-loader .inner-circle {
          width: 64px;
          height: 64px;
          background-color: #E87A86;
          border-radius: 50%;
          animation: pulseGlow 2s infinite;
        }
        .initial-loader .heart {
          position: absolute;
          color: white;
          width: 32px;
          height: 32px;
          animation: float 3s ease-in-out infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @keyframes pulseGlow {
          0% { box-shadow: 0 0 0 0 rgba(232,122,134,0.7); }
          70% { box-shadow: 0 0 0 15px rgba(232,122,134,0); }
          100% { box-shadow: 0 0 0 0 rgba(232,122,134,0); }
        }
        @keyframes float {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-4px); }
        }
        .initial-loader h1 {
          font-size: 28px;
          font-weight: 600;
          margin: 0;
          letter-spacing: 0.5px;
          animation: pulseText 2s infinite;
        }
        @keyframes pulseText {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.7; }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner-ring">
          <div class="outer-ring"></div>
          <div class="inner-circle"></div>
          <svg class="heart" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
        <h1>Maitri</h1>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
